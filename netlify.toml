[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA。未知のパスは index.html を返す
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service Worker と manifest はキャッシュさせない(更新が確実に届くように)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

# ハッシュ付きの静的アセットは長期キャッシュしてよい
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
